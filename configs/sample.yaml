source:
  type: csv
  path: data/sample_orders.csv

target:
  type: duckdb
  table: raw_orders

transform:
  rename_columns:
    orderid: order_id
  cast_types:
    amount: float
    created_at: datetime

validation:
  required_columns:
    - order_id
    - amount
    - created_at
  null_checks:
    - order_id
    - amount
    - created_at
  type_checks:
    order_id: int
    amount: float
    created_at: datetime

load:
  mode: upsert
  incremental:
    enabled: true
    watermark_column: created_at
    primary_key: order_id